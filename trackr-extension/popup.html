<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f7ff;
      width: 320px;
      min-height: 200px;
      color: #0f172a;
    }

    .header {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .logo-text span { color: #93c5fd; }

    .status-badge {
      margin-left: auto;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .status-badge.connected    { background: rgba(255,255,255,0.2); color: #fff; }
    .status-badge.disconnected { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* Job preview card */
    .job-card {
      background: #fff;
      border: 1px solid #e0eaff;
      border-radius: 12px;
      padding: 14px;
    }

    .job-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .job-card-company {
      font-size: 0.8rem;
      color: #2563eb;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .job-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 0.72rem;
      background: #f0f7ff;
      color: #64748b;
      border-radius: 6px;
      padding: 2px 8px;
    }

    .no-job {
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      padding: 12px 0;
      line-height: 1.5;
    }

    /* Status selector */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .status-row label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
    }

    select {
      flex: 1;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.8rem;
      color: #0f172a;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: #3b82f6; }

    /* Buttons */
    .btn-save {
      width: 100%;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-save:hover   { opacity: 0.9; transform: translateY(-1px); }
    .btn-save:active  { transform: translateY(0); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      width: 100%;
      background: none;
      border: 1.5px solid #e2e8f0;
      color: #64748b;
      border-radius: 10px;
      padding: 9px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: #3b82f6; color: #2563eb; background: #eff6ff; }

    /* Result message */
    .result {
      text-align: center;
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 500;
    }
    .result.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .result.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    /* Login prompt */
    .login-prompt {
      text-align: center;
      padding: 8px 0;
    }
    .login-prompt p { font-size: 0.82rem; color: #64748b; margin-bottom: 10px; line-height: 1.5; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 2px 0;
    }

    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #2563eb;
      background: #eff6ff;
      border-radius: 6px;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .footer-note {
      font-size: 0.68rem;
      color: #cbd5e1;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">🎯</div>
    <div class="logo-text">Track<span>r</span></div>
    <div class="status-badge disconnected" id="status-badge">● Checking...</div>
  </div>

  <div class="body">
    <div id="job-preview"></div>
    <div id="actions"></div>
    <div id="result"></div>
    <div class="footer-note">Trackr Job Capture v1.0</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
